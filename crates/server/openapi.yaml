# Remote Harness — REST contract (OpenAPI 3.0.3)
#
# Canonical artifact for JSON routes. Keep this file aligned with docs/API_OVERVIEW.md.
#
# SSE: Event field names and examples are documented in docs/SSE_EVENTS.md (companion).
#      See docs/PROJECT_KICKOFF.md §6 — Communication & Docs.
#
openapi: 3.0.3
info:
  title: Remote Harness Control Plane API
  version: 0.1.0
  description: |
    Control plane REST API. Human-readable API prose and behavior notes live in
    `docs/API_OVERVIEW.md`; this spec is the machine-readable contract for codegen and review.

servers:
  - url: /
    description: Relative to configured control plane base URL

tags:
  - name: health
    description: Liveness and readiness (no authentication)
  - name: apiKeys
    description: Control plane API keys (bootstrap, create, list, revoke)
  - name: sessions
    description: Session lifecycle — chat jobs, retain flags, follow-up input (API key required)
  - name: workers
    description: Worker registry (register, heartbeat, list, get, delete)
  - name: agents
    description: Agent inboxes — enqueue and list pending tasks (API key required)
  - name: identities
    description: BYOL credentials per identity (API key required)
  - name: oauth
    description: Git provider OAuth for identity git_token (no API key; browser flow)

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      operationId: getReady
      responses:
        "200":
          description: Service is ready to accept traffic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Not ready (e.g. database unreachable when DATABASE_URL is set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /health/idle:
    get:
      tags: [health]
      summary: Idle check for sleep-inhibit helpers
      operationId: getHealthIdle
      responses:
        "200":
          description: No pending or assigned jobs (safe to idle)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdleCheckOk"
        "503":
          description: Work is queued or assigned (hold sleep inhibit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdleCheckBusy"

  /auth/github:
    get:
      tags: [oauth]
      summary: Start GitHub OAuth for identity git_token
      operationId: startGithubOauth
      description: |
        Redirects to GitHub with PKCE (S256). Sets HttpOnly `SameSite=Lax` cookie `_rh_oauth` for CSRF and PKCE verifier.
        Requires `GITHUB_CLIENT_ID`, `GITHUB_CLIENT_SECRET`, `GITHUB_REDIRECT_URI`, `REDIRECT_AFTER_AUTH`, and database.
        See docs/API_OVERVIEW.md §4b.
      parameters:
        - name: identity_id
          in: query
          required: false
          schema:
            type: string
            default: default
          description: Identity id to store tokens on
      responses:
        "302":
          description: Redirect to GitHub authorize URL
        "503":
          description: OAuth not configured, database missing, or `REDIRECT_AFTER_AUTH` unset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /auth/github/callback:
    get:
      tags: [oauth]
      summary: GitHub OAuth callback
      operationId: githubOauthCallback
      description: |
        Validates CSRF cookie vs `state`, exchanges `code` for tokens, stores on identity, clears cookie, redirects to `REDIRECT_AFTER_AUTH`.
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
        - name: error_description
          in: query
          schema: { type: string }
      responses:
        "302":
          description: Redirect to `REDIRECT_AFTER_AUTH` with `oauth_success` or `oauth_error` query params
        "400":
          description: Invalid state or cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Misconfigured OAuth or database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /auth/gitlab:
    get:
      tags: [oauth]
      summary: Start GitLab OAuth for identity git_token
      operationId: startGitlabOauth
      description: |
        Same as GitHub but for GitLab (`GITLAB_CLIENT_ID`, `GITLAB_CLIENT_SECRET`, `GITLAB_REDIRECT_URI`, optional `GITLAB_BASE_URL`).
      parameters:
        - name: identity_id
          in: query
          required: false
          schema:
            type: string
            default: default
      responses:
        "302":
          description: Redirect to GitLab authorize URL
        "503":
          description: OAuth not configured or database / `REDIRECT_AFTER_AUTH` missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /auth/gitlab/callback:
    get:
      tags: [oauth]
      summary: GitLab OAuth callback
      operationId: gitlabOauthCallback
      description: Stores `git_base_url` from configured GitLab instance. Otherwise same as GitHub callback.
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
        - name: error_description
          in: query
          schema: { type: string }
      responses:
        "302":
          description: Redirect to `REDIRECT_AFTER_AUTH` with result query params
        "400":
          description: Invalid state or cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Misconfigured OAuth or database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /api-keys/bootstrap:
    post:
      tags: [apiKeys]
      summary: Create the first API key when none exist (no authentication)
      operationId: bootstrapApiKey
      description: |
        Unauthenticated root-equivalent until a key exists. Returns 403 when `API_KEY`/`API_KEYS`
        is set or when any non-revoked key exists. See docs/API_OVERVIEW.md — Bootstrap safety.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: First API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
        "403":
          description: Bootstrap disabled (keys already exist or env bootstrap key configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured or unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /api-keys:
    get:
      tags: [apiKeys]
      summary: List API keys
      operationId: listApiKeys
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated API keys (no secrets)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedApiKeySummaries"
        "400":
          description: Invalid cursor or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
    post:
      tags: [apiKeys]
      summary: Create API key
      operationId: createApiKey
      security:
        - bearerApiKey: []
        - headerApiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created (plain key returned once)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreatedResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /api-keys/{id}:
    delete:
      tags: [apiKeys]
      summary: Revoke API key
      operationId: deleteApiKey
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Key revoked
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /agents/{id}/inbox:
    get:
      tags: [agents]
      summary: List pending inbox tasks for an agent
      operationId: getAgentInbox
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Agent id (same as session params.agent_id for workflow inbox)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated pending inbox tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInboxTaskItems"
        "400":
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
    post:
      tags: [agents]
      summary: Enqueue a task to an agent inbox
      operationId: postAgentInbox
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostAgentInboxRequest"
      responses:
        "202":
          description: Task accepted into inbox queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAgentInboxResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "409":
          description: No running inbox session or conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/register:
    post:
      tags: [workers]
      summary: Register a worker
      operationId: registerWorker
      security:
        - bearerApiKey: []
        - headerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterWorkerRequest"
      responses:
        "201":
          description: Worker registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterWorkerResponse"
        "400":
          description: Invalid body or worker_version_incompatible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "409":
          description: Worker id already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/{id}/heartbeat:
    post:
      tags: [workers]
      summary: Worker heartbeat
      operationId: heartbeatWorker
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerHeartbeatRequest"
      responses:
        "200":
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerHeartbeatResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/{id}/inbox-listener:
    post:
      tags: [workers]
      summary: Register worker as inbox consumer for an agent_id
      operationId: postWorkerInboxListener
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Worker id (must match pull worker_id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostWorkerInboxListenerRequest"
      responses:
        "200":
          description: Listener registered (or stolen from a stale worker)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostWorkerInboxListenerResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Worker or agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "409":
          description: Worker stale or inbox listener held by another active worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers:
    get:
      tags: [workers]
      summary: List workers
      operationId: listWorkers
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated workers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedWorkerSummaries"
        "400":
          description: Invalid cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/{id}:
    get:
      tags: [workers]
      summary: Get worker
      operationId: getWorker
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Worker detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerSummary"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
    delete:
      tags: [workers]
      summary: Delete worker and reclaim assigned jobs
      operationId: deleteWorker
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Worker removed
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Worker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/tasks/pull:
    post:
      tags: [workers]
      summary: Pull next task (lease reclaim, stale reclaim, assign)
      operationId: pullTask
      description: |
        Runs lease expiry (when JOB_LEASE_SECONDS > 0), reclaims jobs assigned to stale workers
        (bounded by MAX_JOB_RECLAIMS), then assigns the oldest pending job to the requesting worker.
        Returns 204 when no work. Requires a fresh heartbeat (non-stale worker).
      security:
        - bearerApiKey: []
        - headerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullTaskRequest"
      responses:
        "200":
          description: Task assigned to this worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullTaskResponse"
        "204":
          description: No pending work
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Worker not registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "409":
          description: Worker heartbeat is stale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/tasks/{id}/complete:
    post:
      tags: [workers]
      summary: Mark worker task complete or failed
      operationId: completeWorkerTask
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Task id (same as job id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCompleteRequest"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCompleteResponse"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Task not found or already completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "409":
          description: Worker mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /workers/tasks/{id}/logs:
    post:
      tags: [workers]
      summary: Append worker log batch for an assigned task
      operationId: postWorkerTaskLogs
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Task id (job id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/WorkerLogIngestItem"
      responses:
        "202":
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerLogsAcceptedResponse"
        "400":
          description: Invalid body or timestamps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "404":
          description: Task not found or not assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /sessions:
    get:
      tags: [sessions]
      summary: List sessions
      operationId: listSessions
      security:
        - bearerApiKey: []
        - headerApiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            description: Filter by session status (e.g. pending, running, completed, failed)
      responses:
        "200":
          description: Paginated sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSessionSummaries"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
    post:
      tags: [sessions]
      summary: Create session (start workflow)
      operationId: createSession
      security:
        - bearerApiKey: []
        - headerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "503":
          description: Database not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"

  /sessions/{id}:
    get:
      tags: [sessions]
      summary: Get session
      operationId: getSession
      security:
        - bearerApiKey: []
