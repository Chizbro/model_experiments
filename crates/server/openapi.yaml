components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      description: "API key as Bearer token (`Authorization: Bearer <api_key>`)"
    headerApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: "API key in `X-API-Key` header"

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
        log_retention_days_default:
          type: integer
          minimum: 0
          description: Default scheduled log retention window in days (`LOG_RETENTION_DAYS_DEFAULT`); Web Settings surfacing (CLIENT_EXPERIENCE §9).
        chat_history_max_turns:
          type: integer
          minimum: 0
          description: Max user/assistant turns included on chat follow-up pull (`CHAT_HISTORY_MAX_TURNS`; `0` disables capping).

    IdleCheckOk:
      type: object
      required: [idle]
      properties:
        idle:
          type: boolean
          enum: [true]

    IdleCheckBusy:
      type: object
      required: [idle, pending_or_assigned_jobs]
      properties:
        idle:
          type: boolean
          enum: [false]
        pending_or_assigned_jobs:
          type: integer
          minimum: 0

    StandardError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: not_found
            message:
              type: string
              example: Resource not found
            details:
              type: object
              additionalProperties: true

    WorkflowKind:
      type: string
      enum:
        - chat
        - loop_n
        - loop_until_sentinel
        - inbox

    CreateSessionRequest:
      type: object
      required: [repo_url, workflow, params]
      properties:
        repo_url:
          type: string
        ref:
          type: string
          description: Git ref (branch or commit); default main when omitted
        workflow:
          $ref: "#/components/schemas/WorkflowKind"
        params:
          type: object
          additionalProperties: true
          description: Workflow-specific parameters (see API_OVERVIEW)
        persona_id:
          type: string
        identity_id:
          type: string
        retain_forever:
          type: boolean
          default: false

    CreateSessionResponse:
      type: object
      required: [session_id, status]
      properties:
        session_id:
          type: string
        status:
          type: string
          description: pending until first job assign (chat/loop); running for inbox with no initial jobs
          example: pending
        web_url:
          type: string
          description: Optional deep link to Web UI for this session

    SessionSummary:
      type: object
      required:
        - session_id
        - repo_url
        - ref
        - workflow
        - status
        - created_at
      properties:
        session_id:
          type: string
        repo_url:
          type: string
        ref:
          type: string
        workflow:
          type: string
        status:
          type: string
        created_at:
          type: string
          description: ISO 8601 timestamp

    PaginatedSessionSummaries:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionSummary"
        next_cursor:
          type: string
          nullable: true

    SessionJobDetail:
      type: object
      required: [job_id, status, created_at]
      properties:
        job_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          description: ISO 8601 timestamp
        error_message:
          type: string
          nullable: true
        pull_request_url:
          type: string
          nullable: true
        commit_ref:
          type: string
          nullable: true
          description: OID recorded at job completion when the worker reports a commit (may be absent if push/commit did not complete).
        retain_forever:
          type: boolean
          default: false
          description: When true, this job's logs are exempt from retention purge

    SessionDetail:
      type: object
      required:
        - session_id
        - repo_url
        - ref
        - workflow
        - status
        - params
        - jobs
        - created_at
        - updated_at
        - retain_forever
        - chat_history_truncated
      properties:
        session_id:
          type: string
        repo_url:
          type: string
        ref:
          type: string
        workflow:
          type: string
        status:
          type: string
        params:
          type: object
          additionalProperties: true
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/SessionJobDetail"
        created_at:
          type: string
        updated_at:
          type: string
        retain_forever:
          type: boolean
          description: When true, this session's logs are exempt from retention purge
        chat_history_truncated:
          type: boolean
          description: Chat workflow only; true when prior turns exceed `chat_history_max_turns` so the next pull would cap history (aligned with Pull task `history_truncated`).
        chat_history_max_turns:
          type: integer
          minimum: 0
          nullable: true
          description: Chat workflow only; server cap for history turns (same as `GET /health`); null when workflow is not chat.

    PatchSessionRetainRequest:
      type: object
      required: [retain_forever]
      properties:
        retain_forever:
          type: boolean

    SendSessionInputRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: Chat follow-up text (workflow chat only).

    SendSessionInputResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean

    PostAgentInboxRequest:
      type: object
      required: [payload]
      properties:
        payload:
          type: object
          additionalProperties: true
          description: Opaque JSON; must include non-empty string field `message` or `prompt` for worker prompt extraction
        persona_id:
          type: string
          nullable: true

    PostAgentInboxResponse:
      type: object
      required: [task_id]
      properties:
        task_id:
          type: string
          format: uuid
          description: Inbox queue row id until promoted to a job on worker pull

    InboxTaskItem:
      type: object
      required: [task_id, payload, enqueued_at]
      properties:
        task_id:
          type: string
          format: uuid
        payload:
          type: object
          additionalProperties: true
        enqueued_at:
          type: string
          format: date-time

    PaginatedInboxTaskItems:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InboxTaskItem"
        next_cursor:
          type: string
          nullable: true

    PostWorkerInboxListenerRequest:
      type: object
      required: [agent_id]
      properties:
        agent_id:
          type: string

    PostWorkerInboxListenerResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    WorkerLogIngestItem:
      type: object
      required: [timestamp, level, message, source]
      properties:
        timestamp:
          type: string
          description: ISO 8601
        level:
          type: string
          example: info
        message:
          type: string
        source:
          type: string
          example: worker

    WorkerLogsAcceptedResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean
          enum: [true]

    LogEntry:
      type: object
      required:
        - id
        - timestamp
        - level
        - session_id
        - source
        - message
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        level:
          type: string
        session_id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
          nullable: true
        worker_id:
          type: string
          nullable: true
        source:
          type: string
        message:
          type: string

    PaginatedLogEntries:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"
        next_cursor:
          type: string
          nullable: true

    CreateApiKeyRequest:
      type: object
      properties:
        label:
          type: string
          nullable: true

    ApiKeyCreatedResponse:
      type: object
      required: [id, key, created_at]
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Plain secret; shown once at creation
        label:
          type: string
          nullable: true
        created_at:
          type: string
          description: ISO 8601 timestamp

    ApiKeySummary:
      type: object
      required: [id, created_at]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
        created_at:
          type: string

    PaginatedApiKeySummaries:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeySummary"
        next_cursor:
          type: string
          nullable: true

    RegisterWorkerRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
        host:
          type: string
          nullable: true
        labels:
          type: object
          additionalProperties: true
        capabilities:
          type: array
          items:
            type: string
        client_version:
          type: string
          description: Semver of worker binary; should match server major.minor
          nullable: true

    RegisterWorkerResponse:
      type: object
      required: [worker_id]
      properties:
        worker_id:
          type: string

    WorkerHeartbeatRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [idle, busy]
        current_job_id:
          type: string
          nullable: true

    WorkerHeartbeatResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    WorkerSummary:
      type: object
      required: [worker_id, labels, status]
      properties:
        worker_id:
          type: string
        host:
          type: string
          nullable: true
        labels:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [active, stale]
        last_seen_at:
          type: string
          nullable: true
          description: ISO 8601
        capabilities:
          type: array
          items:
            type: string
          nullable: true
          description: Present on GET /workers/{id}

    PaginatedWorkerSummaries:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkerSummary"
        next_cursor:
          type: string
          nullable: true

    PullTaskRequest:
      type: object
      properties:
        worker_id:
          type: string
          description: Worker id (required for v1; server does not infer from API key alone)

    TaskCredentials:
      type: object
      required: [git_token, agent_token]
      properties:
        git_token:
          type: string
        agent_token:
          type: string

    PullTaskResponse:
      type: object
      required:
        - task_id
        - job_id
        - session_id
        - repo_url
        - ref
        - workflow
        - task_input
        - params
        - credentials
      properties:
        task_id:
          type: string
        job_id:
          type: string
        session_id:
          type: string
        repo_url:
          type: string
        ref:
          type: string
        workflow:
          type: string
        prompt_context:
          type: string
        task_input:
          type: object
          additionalProperties: true
        params:
          type: object
          additionalProperties: true
        credentials:
          $ref: "#/components/schemas/TaskCredentials"

    TaskCompleteRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [success, failed]
        worker_id:
          type: string
          nullable: true
        branch:
          type: string
          nullable: true
        commit_ref:
          type: string
          nullable: true
        mr_title:
          type: string
          nullable: true
        mr_description:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        output:
          type: string
          nullable: true
        sentinel_reached:
          type: boolean
          nullable: true
          description: >
            For workflow `loop_until_sentinel`, set `true` when the worker detected the session `params.sentinel`
            literal substring in captured output for this iteration (v1: case-sensitive match). The server stops
            enqueuing further iterations and marks the session completed. Omit or `false` to continue until the
            configured max iteration cap.
        assistant_reply:
          type: string
          nullable: true

    TaskCompleteResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    IdentityCredentials:
      type: object
      required: [has_git_token, has_agent_token]
      properties:
        has_git_token:
          type: boolean
        has_agent_token:
          type: boolean

    GitTokenStatus:
      type: string
      enum:
        - healthy
        - expiring_soon
        - expired_refreshable
        - expired_needs_reauth
        - unknown
        - not_configured

    IdentityAuthStatus:
      type: object
      required: [git_token_status, message]
      properties:
        git_token_status:
          $ref: "#/components/schemas/GitTokenStatus"
        git_provider:
          type: string
          nullable: true
          description: manual | oauth_github | oauth_gitlab when known
        token_expires_at:
          type: string
          nullable: true
          description: ISO 8601 when expiry is tracked
        message:
          type: string
        agent_token_status:
          type: string
          nullable: true
          description: not_configured | healthy when agent token presence is summarized

    IdentityRepositoryItem:
      type: object
      required: [full_name, clone_url]
      properties:
        full_name:
          type: string
        clone_url:
          type: string

    IdentityRepositoriesResponse:
      type: object
      required: [items, provider]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/IdentityRepositoryItem"
        provider:
          type: string
          enum: [github, gitlab]

    PatchIdentityRequest:
      type: object
      description: |
        JSON merge patch for stored tokens. Omit a property to leave it unchanged.
        Set a property to JSON null to clear stored ciphertext. Plain strings set new values.
      properties:
        agent_token:
          type: string
          nullable: true
        git_token:
          type: string
          nullable: true
        refresh_token:
          type: string
          nullable: true
