          schema:
            type: string
            format: uuid
        - name: level
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 'Open SSE stream (Content-Type: text/event-stream)'
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE frames: event "log" plus data line with JSON LogEntry; interleaved keep-alive comments.
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandardError"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
