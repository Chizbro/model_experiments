services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: remote_harness
      POSTGRES_PASSWORD: remote_harness
      POSTGRES_DB: remote_harness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote_harness -d remote_harness"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RH_DOCKER_SRC_TS: ${RH_DOCKER_SRC_TS:-0}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # sqlx uses rustls; disable TLS for the in-compose Postgres service.
      DATABASE_URL: postgres://remote_harness:remote_harness@postgres:5432/remote_harness?sslmode=disable
      API_KEY: ${API_KEY:-dev-key-change-in-production}
      # OAuth: set in repo-root `.env`; Compose interpolates from the host environment / `.env` file.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      REDIRECT_AFTER_AUTH: ${REDIRECT_AFTER_AUTH:-}
      OAUTH_COOKIE_SECURE: ${OAUTH_COOKIE_SECURE:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_REDIRECT_URI: ${GITLAB_REDIRECT_URI:-}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        RH_DOCKER_SRC_TS: ${RH_DOCKER_SRC_TS:-0}
        CURSOR_AGENT_VERSION: ${CURSOR_AGENT_VERSION:-2026.03.20-44cb435}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_healthy
    environment:
      CONTROL_PLANE_URL: http://server:3000
      API_KEY: ${API_KEY:-dev-key-change-in-production}
      # Image includes Cursor `agent` on PATH. For Claude Code, set CLAUDE_CLI_PATH or extend the image.
      # Smoke without any vendor CLI: docker-compose.smoke.yml or REMOTE_HARNESS_STUB_AGENT=1.
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  postgres_data:
