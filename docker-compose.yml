services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: remote_harness
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./server"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/remote_harness
      API_KEY: ${API_KEY:-dev-key-change-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      HOST: 0.0.0.0
      PORT: "3000"
      RUST_LOG: ${RUST_LOG:-info}
      WORKER_STALE_SECONDS: ${WORKER_STALE_SECONDS:-90}
      MAX_JOB_RECLAIMS: ${MAX_JOB_RECLAIMS:-3}
      JOB_LEASE_SECONDS: ${JOB_LEASE_SECONDS:-600}
      CHAT_HISTORY_MAX_TURNS: ${CHAT_HISTORY_MAX_TURNS:-50}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      GITLAB_REDIRECT_URI: ${GITLAB_REDIRECT_URI:-}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-https://gitlab.com}
      REDIRECT_AFTER_AUTH: ${REDIRECT_AFTER_AUTH:-http://localhost:5173/settings}
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./worker"]
    depends_on:
      - server
    env_file:
      - .env
    environment:
      CONTROL_PLANE_URL: http://server:3000
      REMOTE_HARNESS_API_KEY: ${API_KEY:-dev-key-change-in-production}
      RUST_LOG: ${RUST_LOG:-info}
      CURSOR_AGENT_PATH: /usr/local/bin/cursor
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  pgdata:
