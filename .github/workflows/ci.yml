name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://remote_harness:remote_harness@localhost:5432/remote_harness?sslmode=disable
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: remote_harness
          POSTGRES_PASSWORD: remote_harness
          POSTGRES_DB: remote_harness
        options: >-
          --health-cmd "pg_isready -U remote_harness -d remote_harness"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 8
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build
        run: cargo build --all-targets

      # Single thread: integration tests share one Postgres (no isolated DB per test binary).
      - name: cargo test
        run: cargo test --all-targets -- --test-threads=1

  web:
    name: Web (lint, typecheck, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build

      - run: npm run test
